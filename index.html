<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .container{
      background:white;
      padding:30px;
      width:350px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    .input-group{
      margin-bottom:15px;
    }

    label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:black;
      color:white;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      opacity:0.9;
    }

    .result{
      margin-top:20px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .status{
      margin-top:10px;
      text-align:center;
      font-size:18px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>BMI Calculator</h1>

    <div class="input-group">
      <label for="height">Height (cm)</label>
      <input type="number" id="height" placeholder="Enter height">
    </div>

    <div class="input-group">
      <label for="weight">Weight (kg)</label>
      <input type="number" id="weight" placeholder="Enter weight">
    </div>

    <button id="calculateBtn">Calculate BMI</button>
    <button id="theme">switch theme</button>

    <div class="result" id="result">
      Your BMI:
    </div>

    <div class="status" id="status">
      
    </div>
  </div>

  <script src="script.js"> </script>

</body>
</html>
